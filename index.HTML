<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 網頁全體視覺設計：高科技暗黑風格 */
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: #060B1A;
            color: #F5F7FA;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            color: #00E5FF;
            text-align: center;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: #0E1832;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #1E3A8A;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #78909C;
            font-weight: bold;
        }
        /* 單行輸入框與下拉選單樣式 */
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            background-color: #060B1A;
            border: 1px solid #1E3A8A;
            color: #F5F7FA;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00E5FF;
        }
        /* 多行輸入框 (textarea) 的專屬樣式 */
        .form-textarea {
            width: 100%;
            padding: 10px;
            background-color: #060B1A;
            border: 1px solid #1E3A8A;
            color: #F5F7FA;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s;
            resize: vertical;
            line-height: 1.5;
        }
        .form-textarea:focus {
            outline: none;
            border-color: #00E5FF;
        }
        select {
            cursor: pointer;
            appearance: auto;
        }
        .custom-select {
            position: relative;
            width: 100%;
        }
        .select-box {
            padding: 10px;
            background-color: #060B1A;
            border: 1px solid #1E3A8A;
            color: #F5F7FA;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .options-grid {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: #0E1832;
            border: 1px solid #00E5FF;
            border-radius: 5px;
            z-index: 100;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.8);
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
        .options-grid.show {
            display: grid;
        }
        .option-item {
            padding: 8px;
            text-align: center;
            background-color: #1E3A8A;
            color: #F5F7FA;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .option-item:hover {
            background-color: #00E5FF;
            color: #060B1A;
            font-weight: bold;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .btn-generate {
            width: 100%;
            padding: 15px;
            background-color: #00E5FF;
            color: #060B1A;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-generate:hover {
            background-color: #2979FF;
            color: #FFF;
        }
        .output-group {
            margin-top: 30px;
            background-color: #060B1A;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1E3A8A;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .output-header h3 {
            margin: 0;
            color: #00E5FF;
            font-size: 18px;
        }
        .copy-btn {
            padding: 8px 16px;
            background-color: #2979FF;
            color: #FFF;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .copy-btn:hover {
            background-color: #00E5FF;
            color: #060B1A;
        }
        .output-group textarea {
            width: 100%;
            height: 400px;
            background-color: #000;
            color: #00E676;
            border: 1px solid #1E3A8A;
            border-radius: 5px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
        }
        
        /* 專屬色彩預覽區塊 */
        .theme-color-display {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 20px;
            color: #F5F7FA;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .theme-color-pill {
            display: flex;
            align-items: center;
            background-color: #152238; 
            border: 1px solid #28547C; 
            border-radius: 50px;
            padding: 8px 22px 8px 14px;
            margin-left: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .theme-color-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        .theme-color-text {
            color: #79C2E7; 
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<div class="container">

    <div class="grid-container">

            <div class="form-group">

            <div class="form-group">

            <div class="form-group">

            <div class="form-group">

        </div>
    </div>

    <button class="btn-generate" onclick="generateYAML()">一鍵生成專屬 YAML 指令檔</button>

        <textarea id="output-ppt-1" readonly placeholder="生成結果將顯示於此..."></textarea>

    <div class="output-group">

    function initSelect(elementId, dataArray) {
        const wrapper = document.getElementById(elementId);
        const box = wrapper.querySelector('.select-box');
        const grid = wrapper.querySelector('.options-grid');
        const hiddenInput = wrapper.querySelector('input[type="hidden"]');

        dataArray.forEach(item => {
            let div = document.createElement('div');
            div.className = 'option-item';
            div.innerText = item;
            div.onclick = (e) => {
                e.stopPropagation();
                box.innerText = item;
                hiddenInput.value = item === "無" ? "" : item;
                grid.classList.remove('show');

    function hexToHSL(hex) {
        let r = parseInt(hex.substring(1,3), 16) / 255;
        let g = parseInt(hex.substring(3,5), 16) / 255;
        let b = parseInt(hex.substring(5,7), 16) / 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) {
            h = s = 0;
        } else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function getMatchedNoun(hex, hash) {
        const hsl = hexToHSL(hex);
        const h = hsl.h;
        const s = hsl.s;
        let selectedArray = [];

        if (s < 20) {
            selectedArray = themeNouns.gray;
        } else if (h >= 345 || h < 15) {
            selectedArray = themeNouns.red;
        } else if (h >= 15 && h < 45) {
            selectedArray = themeNouns.orange;
        } else if (h >= 45 && h < 75) {
            selectedArray = themeNouns.yellow;
        } else if (h >= 75 && h < 165) {
            selectedArray = themeNouns.green;
        } else if (h >= 165 && h < 195) {
            selectedArray = themeNouns.cyan;
        } else if (h >= 195 && h < 260) {
            selectedArray = themeNouns.blue;
        } else {
            selectedArray = themeNouns.purple;
        }

        const index = Math.abs(hash >> 4) % selectedArray.length;
        return selectedArray[index];
    }

    function updateColorPreviewFromTitle() {
        const titleText = document.getElementById('report-title').value || "智慧科技";
        
        let hash = 0;
        for (let i = 0; i < titleText.length; i++) {
            hash = titleText.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        let hex = '#';
        for (let i = 0; i < 3; i++) {
            let value = (Math.abs(hash >> (i * 8)) & 0xFF);
            value = Math.max(100, value).toString(16); 
            hex += value.length === 1 ? '0' + value : value;
        }
        const themeHex = hex.toUpperCase();

        const adjIndex = Math.abs(hash) % themeAdjectives.length;
        const matchedNoun = getMatchedNoun(themeHex, hash);
        const colorName = themeAdjectives[adjIndex] + matchedNoun;
        
        const displayColorName = `專屬 ${colorName}調`;
        
        const colorBox = document.getElementById('preview-color-box');
        const colorText = document.getElementById('preview-color-text');
        
        colorBox.style.backgroundColor = themeHex;
        colorBox.style.boxShadow = `0 0 16px 2px ${themeHex}`;
        colorText.innerText = displayColorName;

        document.getElementById('val-theme-color-name').value = colorName;
        document.getElementById('val-theme-color-hex').value = themeHex;
    }

            btnElement.innerText = "已複製！";
            btnElement.style.backgroundColor = "#2979FF"; 
            btnElement.style.color = "#FFF";
            
            if (btnElement.copyTimeout) {

            btnElement.copyTimeout = setTimeout(() => {

    }
