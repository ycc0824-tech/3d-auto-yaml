<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 擬真簡報與圖表風格生成引擎</title>
    <style>
        /* ====== 設計令牌 ====== */
        :root {
            --bg-deep:      #060B1A;
            --bg-card:      #0E1832;
            --bg-input:     #060B1A;
            --border:       #1E3A8A;
            --border-focus: #00E5FF;
            --accent:       #00E5FF;
            --accent2:      #2979FF;
            --danger:       #FF3D00;
            --success:      #00E676;
            --text:         #F5F7FA;
            --text-dim:     #78909C;
            --text-pill:    #79C2E7;
            --radius:       8px;
            --radius-lg:    12px;
            --shadow:       0 12px 32px rgba(0,0,0,0.6);
            --glow:         0 0 12px rgba(0,229,255,0.3);
            --transition:   0.22s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            padding: 24px 16px 60px;
            min-height: 100vh;
        }

        /* ── 頁首 ── */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .page-header h1 {
            color: var(--accent);
            font-size: clamp(18px, 2.6vw, 26px);
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(0,229,255,0.4);
        }
        .page-header .sub {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .badge {
            display: inline-block;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.25);
            color: var(--accent);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        /* ── 容器 ── */
        .container {
            max-width: 1160px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 32px 36px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow), inset 0 1px 1px rgba(255,255,255,0.04);
        }

        /* ── 分區標題 ── */
        .section-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .section-title span { color: var(--accent); }

        /* ── 分隔線 ── */
        hr.divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 28px 0;
        }

        /* ── 網格 ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        /* ── 表單群組 ── */
        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--accent);
            font-weight: bold;
            font-size: 13px;
        }
        .label-sub {
            font-size: 11px;
            font-weight: normal;
            color: var(--text-dim);
            margin-left: 4px;
        }

        /* ── 輸入元件 ── */
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 13px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: var(--glow);
        }
        input[readonly] { color: var(--text-dim); cursor: default; }
        textarea { resize: vertical; line-height: 1.6; }
        select { cursor: pointer; }

        /* ── 步進器 ── */
        .stepper-wrap { display: flex; align-items: center; gap: 10px; }
        .stepper {
            display: flex;
            flex: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            height: 42px;
            background: var(--bg-input);
            transition: border-color var(--transition);
        }
        .stepper:focus-within { border-color: var(--border-focus); box-shadow: var(--glow); }
        .stepper input[type="number"] {
            border: none;
            border-radius: 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            background: transparent;
            padding: 0;
        }
        .stepper input::-webkit-inner-spin-button,
        .stepper input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .stepper input { -moz-appearance: textfield; }
        .stepper input:focus { outline: none; box-shadow: none; }
        .step-btn {
            background: #152040;
            color: var(--text);
            border: none;
            width: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-shrink: 0;
        }
        .step-btn:hover { background: var(--accent); color: var(--bg-deep); }
        .stepper-unit { color: var(--text-dim); font-size: 13px; white-space: nowrap; font-weight: bold; }

        /* ── 自訂選單（格狀） ── */
        .custom-select { position: relative; width: 100%; }
        .select-box {
            padding: 10px 13px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius);
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color var(--transition);
        }
        .select-box::after {
            content: "▾";
            color: var(--text-dim);
            font-size: 12px;
            transition: transform var(--transition);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .select-box.open { border-color: var(--border-focus); box-shadow: var(--glow); }
        .select-box.open::after { transform: rotate(180deg); }
        .options-grid {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 100%;
            background: #0A1428;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            z-index: 200;
            padding: 10px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.85);
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-height: 260px;
            overflow-y: auto;
        }
        .options-grid.show { display: grid; }
        .options-grid::-webkit-scrollbar { width: 5px; }
        .options-grid::-webkit-scrollbar-track { background: transparent; }
        .options-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .option-item {
            padding: 7px 4px;
            text-align: center;
            background: #152040;
            color: var(--text);
            border-radius: 5px;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            font-size: 12.5px;
            line-height: 1.3;
        }
        .option-item:hover { background: var(--accent); color: var(--bg-deep); font-weight: bold; }
        .option-item.selected { background: rgba(0,229,255,0.15); border: 1px solid var(--accent); color: var(--accent); }

        /* ── 色調預覽 ── */
        .color-preview-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0A1428;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 20px;
            margin-bottom: 22px;
        }
        .color-preview-label { font-size: 14px; color: var(--text); white-space: nowrap; }
        .color-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #152238;
            border: 1px solid #28547C;
            border-radius: 50px;
            padding: 8px 20px 8px 12px;
        }
        .color-dot {
            width: 18px; height: 18px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background-color 0.4s, box-shadow 0.4s;
        }
        .color-name {
            color: var(--text-pill);
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .color-hex-badge {
            margin-left: auto;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        /* ── 風格組合預覽 ── */
        .style-preview {
            background: rgba(0,229,255,0.04);
            border: 1px dashed rgba(0,229,255,0.2);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .style-preview .label { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
        .style-preview .value {
            color: var(--accent);
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ── 生成按鈕 ── */
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform var(--transition), box-shadow var(--transition);
            letter-spacing: 2px;
        }
        .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,229,255,0.4); }
        .btn-generate:active { transform: translateY(0); }

        /* ── 輸出區 ── */
        .output-section { margin-top: 32px; display: flex; flex-direction: column; gap: 20px; }
        .output-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .output-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0A1020;
            padding: 11px 18px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }
        .output-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot-row { display: flex; gap: 6px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .output-title {
            font-size: 13px;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .output-toolbar-right { display: flex; align-items: center; gap: 8px; }
        .char-count { font-size: 12px; color: var(--text-dim); }

        .output-textarea {
            width: 100%;
            height: 380px;
            background: #020408;
            color: #00E676;
            border: none;
            padding: 18px 20px;
            font-family: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
            font-size: 13.5px;
            line-height: 1.65;
            resize: vertical;
        }
        .output-textarea:focus { outline: none; }
        .output-textarea::-webkit-scrollbar { width: 6px; }
        .output-textarea::-webkit-scrollbar-track { background: transparent; }
        .output-textarea::-webkit-scrollbar-thumb { background: #1E3A8A; border-radius: 3px; }

        /* ── 功能按鈕 ── */
        .btn {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition);
            background: #152040;
            color: var(--text);
            font-family: inherit;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.copy { background: var(--success); border-color: var(--success); color: #000; }
        .btn.copy:hover { background: #33EE88; }
        .btn.copy.done { background: var(--accent2); border-color: var(--accent2); color: #fff; }
        .btn.dl { background: #152040; }

        /* ── 提示條 ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0E1832;
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 12px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.err { border-color: var(--danger); color: #FF8A80; }

        /* ── 進度條 ── */
        @keyframes sweep { 0%{left:-40%;width:40%} 100%{left:100%;width:40%} }
        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2px;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-indicator {
            position: relative;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: sweep 1.1s ease-in-out infinite;
        }

        /* ── RWD ── */
        @media (max-width: 900px) {
            .container { padding: 24px 20px; }
            .grid-2 { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .options-grid { grid-template-columns: repeat(4,1fr); }
        }
        @media (max-width: 600px) {
            .container { padding: 18px 14px; }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .options-grid { grid-template-columns: repeat(3,1fr); }
            .output-toolbar { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<div class="page-header">
    <h1>3D 擬真簡報與圖表風格生成引擎 <span class="badge">v2.0</span></h1>
    <div class="sub">組合風格模組 → 填寫資訊 → 一鍵生成三份 YAML 指令檔</div>
</div>

<div class="container">

    <!-- ══ 區塊一：風格模組 ══ -->
    <div class="section-title"><span>01</span> &nbsp;風格模組組合</div>
    <div class="grid-2">

        <!-- 左：簡報風格 -->
        <div>
            <div class="form-group">
                <label>風格基底 <span class="label-sub">(固定)</span></label>
                <input type="text" value="3D 擬真 + 主題物件連動" readonly>
            </div>
            <div class="form-group">
                <label>形容詞模組 <span class="label-sub">(可不選 / 30 種)</span></label>
                <div class="custom-select" id="select-adj">
                    <div class="select-box" data-placeholder="無（點擊展開選擇）">無（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-adj" value="">
                </div>
            </div>
            <div class="form-group">
                <label>色調模組 <span class="label-sub">(可不選 / 30 種)</span></label>
                <div class="custom-select" id="select-color">
                    <div class="select-box" data-placeholder="無（點擊展開選擇）">無（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-color" value="">
                </div>
            </div>
            <div class="form-group">
                <label>名詞模組 <span class="label-sub">(必選 / 30 種)</span></label>
                <div class="custom-select" id="select-noun">
                    <div class="select-box">核心（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-noun" value="核心">
                </div>
            </div>
        </div>

        <!-- 右：圖表設定 -->
        <div>
            <div class="form-group">
                <label>圖表需求類型 <span class="label-sub">(30 種)</span></label>
                <div class="custom-select" id="select-type">
                    <div class="select-box">數據分析（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-type" value="數據分析">
                </div>
            </div>
            <div class="form-group">
                <label>圖表視覺風格 <span class="label-sub">(30 種)</span></label>
                <div class="custom-select" id="select-chart-style">
                    <div class="select-box">玻璃擬真（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-chart-style" value="玻璃擬真">
                </div>
            </div>
            <div class="form-group">
                <label>畫面佈局 <span class="label-sub">(30 種)</span></label>
                <div class="custom-select" id="select-layout">
                    <div class="select-box">網格陣列（點擊展開）</div>
                    <div class="options-grid"></div>
                    <input type="hidden" id="val-layout" value="網格陣列">
                </div>
            </div>
            <div class="form-group">
                <label>圖表補充需求 <span class="label-sub">(選填)</span></label>
                <textarea id="chart-extra" rows="3" placeholder="數據重點、風格避諱或版面要求..."></textarea>
            </div>
        </div>
    </div>

    <!-- 風格組合即時預覽 -->
    <div class="style-preview" id="style-preview-bar">
        <span class="label">目前風格組合：</span>
        <span class="value" id="style-preview-text">3D 擬真核心</span>
    </div>

    <hr class="divider">

    <!-- ══ 區塊二：基本資訊 ══ -->
    <div class="section-title"><span>02</span> &nbsp;團隊基本資訊</div>

    <!-- 色調預覽 -->
    <div class="color-preview-bar">
        <span class="color-preview-label">主題專屬 3D 色調：</span>
        <div class="color-pill">
            <div class="color-dot" id="color-dot"></div>
            <span class="color-name" id="color-name">等待演算...</span>
        </div>
        <span class="color-hex-badge" id="color-hex-badge">#------</span>
    </div>

    <input type="hidden" id="val-theme-color-name" value="">
    <input type="hidden" id="val-theme-color-hex"  value="">

    <div class="grid-2">
        <div>
            <div class="form-group">
                <label>簡報主題 <span class="label-sub">(輸入時自動演算色調)</span></label>
                <input type="text" id="report-title" value="智慧科技導入與營運策略報告" oninput="onTitleInput()">
            </div>
            <div class="form-group">
                <label>次標題 <span class="label-sub">(學校 / 系級)</span></label>
                <input type="text" id="report-subtitle" value="健行科技大學 進二技 工管三甲">
            </div>
            <div class="form-group">
                <label>報告人 <span class="label-sub">(組別)</span></label>
                <input type="text" id="report-group" value="第六小組">
            </div>
            <div class="form-group">
                <label>小組成員 <span class="label-sub">(每行一人，自動轉換格式)</span></label>
                <textarea id="report-members" rows="5">楊啟正 C11431109
鍾曉彤 C11431125
蕭建鳴 C11431105
蘇萬紘 C11431124
陳國銘 C11431120
詹朝元 C11431143</textarea>
            </div>
        </div>

        <div>
            <div class="form-group">
                <label>簡報類型</label>
                <select id="report-type">
                    <option value="學術專案報告">學術專案報告</option>
                    <option value="論文發表" selected>論文發表</option>
                    <option value="商業提案企劃">商業提案企劃</option>
                    <option value="期末成果展演">期末成果展演</option>
                    <option value="產品發表會">產品發表會</option>
                    <option value="專題研討會">專題研討會</option>
                    <option value="教育訓練課程">教育訓練課程</option>
                    <option value="專案進度匯報">專案進度匯報</option>
                </select>
            </div>
            <div class="form-group">
                <label>簡報頁數</label>
                <div class="stepper-wrap">
                    <div class="stepper">
                        <button type="button" class="step-btn" onclick="step('report-pages',-5,5)">−</button>
                        <input type="number" id="report-pages" value="20" min="5" step="5">
                        <button type="button" class="step-btn" onclick="step('report-pages',5,5)">+</button>
                    </div>
                    <span class="stepper-unit">頁</span>
                </div>
            </div>
            <div class="form-group">
                <label>報告時間</label>
                <div class="stepper-wrap">
                    <div class="stepper">
                        <button type="button" class="step-btn" onclick="step('report-time',-5,5)">−</button>
                        <input type="number" id="report-time" value="40" min="5" step="5">
                        <button type="button" class="step-btn" onclick="step('report-time',5,5)">+</button>
                    </div>
                    <span class="stepper-unit">分鐘</span>
                </div>
            </div>
            <div class="form-group">
                <label>報告場景</label>
                <select id="report-scene">
                    <option value="大型會議室投影（放大字級）" selected>大型會議室投影（放大字級）</option>

function initSelect(elementId, dataArray, defaultVal) {
    const wrapper     = document.getElementById(elementId);
    const box         = wrapper.querySelector('.select-box');
    const grid        = wrapper.querySelector('.options-grid');
    const hiddenInput = wrapper.querySelector('input[type="hidden"]');

    dataArray.forEach(item => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.textContent = item;
        if (item === defaultVal || (defaultVal === '' && item === '無')) {
            div.classList.add('selected');
        }
        div.addEventListener('click', e => {
            e.stopPropagation();
            // 清除舊選中
            grid.querySelectorAll('.option-item').forEach(d => d.classList.remove('selected'));
            div.classList.add('selected');

            const display = item === "無" ? "無（點擊展開）" : item;
            box.textContent = display;
            hiddenInput.value = item === "無" ? "" : item;
            grid.classList.remove('show');
            box.classList.remove('open');
            updateStylePreview();
        });
        grid.appendChild(div);
    });

    box.addEventListener('click', e => {
        e.stopPropagation();
        // 關閉其他選單
        document.querySelectorAll('.options-grid').forEach(g => {
            if (g !== grid) {
                g.classList.remove('show');
                g.closest('.custom-select').querySelector('.select-box').classList.remove('open');
            }
        });
        const isOpen = grid.classList.toggle('show');
        box.classList.toggle('open', isOpen);
    });
}

/* ════════════════════════════════════
   色彩演算
════════════════════════════════════ */
function hexToHSL(hex) {
    let r = parseInt(hex.slice(1,3),16)/255;
    let g = parseInt(hex.slice(3,5),16)/255;
    let b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
        const d = max-min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max){
            case r: h = (g-b)/d + (g < b ? 6 : 0); break;
            case g: h = (b-r)/d + 2; break;
            case b: h = (r-g)/d + 4; break;
        }
        h /= 6;
    }
    return { h: h*360, s: s*100, l: l*100 };
}

function getMatchedNoun(hex, hash) {
    const {h, s} = hexToHSL(hex);
    let arr = themeNouns.gray;
    if      (s >= 20 && (h >= 345 || h < 15))  arr = themeNouns.red;
    else if (s >= 20 && h >= 15  && h < 45)    arr = themeNouns.orange;
    else if (s >= 20 && h >= 45  && h < 75)    arr = themeNouns.yellow;
    else if (s >= 20 && h >= 75  && h < 165)   arr = themeNouns.green;
    else if (s >= 20 && h >= 165 && h < 195)   arr = themeNouns.cyan;
    else if (s >= 20 && h >= 195 && h < 260)   arr = themeNouns.blue;
    else if (s >= 20)                           arr = themeNouns.purple;
    return arr[Math.abs(hash >> 4) % arr.length];
}

function computeTitleColor(text) {
    let hash = 0;
    for (let i = 0; i < text.length; i++) {
        hash = text.charCodeAt(i) + ((hash << 5) - hash);
    }
    let hex = '#';
    for (let i = 0; i < 3; i++) {
        let v = Math.max(100, Math.abs(hash >> (i*8)) & 0xFF);
        hex += v.toString(16).padStart(2,'0');
    }
    return { hex: hex.toUpperCase(), hash };
}

let colorDebounceTimer = null;
function onTitleInput() {
    clearTimeout(colorDebounceTimer);
    colorDebounceTimer = setTimeout(updateColorPreview, 120);
}

function updateColorPreview() {

    const noun    = getMatchedNoun(hex, hash);

    document.getElementById('color-name').textContent = `專屬 ${name} 調`;
    document.getElementById('color-hex-badge').textContent = hex;
    document.getElementById('val-theme-color-name').value = name;
    document.getElementById('val-theme-color-hex').value  = hex;
}

function setOutput(id, text, countId) {
    document.getElementById(id).value = text;
    document.getElementById(countId).textContent = `${text.length} 字元`;
}

/* ════════════════════════════════════
   複製 / 下載
════════════════════════════════════ */
function copyOutput(textareaId, btnId) {
    const text = document.getElementById(textareaId).value;
    if (!text.trim()) { showToast('請先生成 YAML！', true); return; }
    const btn = document.getElementById(btnId);

    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ 已複製！';
        btn.classList.add('done');
        showToast('已複製至剪貼簿！');
        clearTimeout(btn._t);
        btn._t = setTimeout(() => {
            btn.textContent = '複製全文';
            btn.classList.remove('done');
        }, 2500);
    }).catch(() => showToast('請手動全選複製（Ctrl+A）', true));
}

function downloadOutput(textareaId, suffix) {
    const text = document.getElementById(textareaId).value;
    if (!text.trim()) { showToast('請先生成 YAML！', true); return; }
    const title = (document.getElementById('report-title').value.trim() || 'output').slice(0,20).replace(/\s+/g,'_');
    const filename = `${title}_${suffix}.yaml`;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast(`已下載：${filename}`);
}

/* ════════════════════════════════════
   Toast 提示
════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, isErr = false) {
    const el = document.getElementById('toast');
    el.textContent = (isErr ? '⚠ ' : '✓ ') + msg;
    el.className = 'toast' + (isErr ? ' err' : '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
